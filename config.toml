baseurl = "/"
title = "Tyma"
description = "I've been thinking.."
languageCode = "en-us"
paginate = "10"
theme = "risotto"
mainSections = ["post"] # Moved to the root level!
publishDir = "docs"

[author] # Lowercased
  name = "Paul Tyma"
  avatar = "img/avatar.png"

[params] # Lowercased
  subtitle = "I've been thinking"
  description = "Tyma's Blog"
  copyright = "Tyma"
  opengraph = true
  twitter_cards = true
  readmore = false
  authorbox = true
  toc = false
  post_navigation = true
  post_meta = ["date", "categories", "translations"]
  dateformat = "2006-01-02"
  mathjax = true
  mathjaxPath = "https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.6/MathJax.js"
  mathjaxConfig = "TeX-AMS-MML_HTMLorMML"
  highlightColor = "#e22d30"
  customCSS = ["css/custom.css"]
  customJS = ["js/custom.js"]

# --- DELETE OR REMOVE [params.sidebar] AND [params.widgets] SECTIONS ---
# Risotto completely ignores those legacy Mainroad theme blocks.

# --- CHANGE THIS BLOCK TO PARAMS.ABOUT ---
[params.about]
  description = "I've been thinking"  # Risotto uses 'description' inside about for the text blurb
  logo = "img/avatar.png"             # (Optional) This puts your avatar in the sidebar too!

  # Move your social media handlers here, directly inside [params.about]
  linkedin = "paul-byron-tyma-8a9b9217"   
  email = "paul@tyma.com"                 
  github = "paultyma"                     

[[menu.main]]
  name = "Posts"
  url = "/posts/"
  weight = 1
